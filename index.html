<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="飞机设计复习">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f1923">
  <title>✈ 飞机设计工程学 · 填空题复习</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>">
</head>
<body>
  <div id="app">
    <!-- 移动端底部导航 -->
    <nav id="mobile-nav">
      <div class="mobile-nav-item active" data-page="home">
        <span class="mobile-nav-icon">🏠</span>
        <span class="mobile-nav-label">首页</span>
      </div>
      <div class="mobile-nav-item" data-page="practice">
        <span class="mobile-nav-icon">📋</span>
        <span class="mobile-nav-label">练习</span>
      </div>
      <div class="mobile-nav-item" data-page="exam">
        <span class="mobile-nav-icon">📝</span>
        <span class="mobile-nav-label">考试</span>
      </div>
      <div class="mobile-nav-item" data-page="wrongbook">
        <span class="mobile-nav-icon">📕</span>
        <span class="mobile-nav-label">错题</span>
      </div>
      <div class="mobile-nav-item" data-page="stats">
        <span class="mobile-nav-icon">📊</span>
        <span class="mobile-nav-label">统计</span>
      </div>
    </nav>

    <!-- 侧边栏遮罩（移动端） -->
    <div id="sidebar-overlay"></div>

    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg viewBox="-20 -10 60 40" width="28" height="28">
            <path d="M0,10 L10,-5 L20,10 L15,10 L10,0 L5,10 Z" fill="#4a9eff"/>
          </svg>
          飞机设计工程学
        </div>
        <div class="subtitle">填空题复习系统</div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">复习</div>
        <div class="nav-item active" data-page="home">
          <span class="nav-icon">🏠</span> 首页
        </div>
        <div class="nav-item" data-page="practice">
          <span class="nav-icon">📋</span> 练习
        </div>
        <div class="nav-item" data-page="exam">
          <span class="nav-icon">📝</span> 考试
        </div>

        <div class="nav-section">记录</div>
        <div class="nav-item" data-page="wrongbook">
          <span class="nav-icon">📕</span> 错题本
          <span class="nav-badge" style="display:none;">0</span>
        </div>
        <div class="nav-item" data-page="stats">
          <span class="nav-icon">📊</span> 统计
        </div>

        <div class="nav-section">其他</div>
        <div class="nav-item" data-page="settings">
          <span class="nav-icon">⚙</span> 设置
        </div>
      </nav>

      <div style="padding:16px 20px;border-top:1px solid var(--border-color);font-size:0.72rem;color:var(--text-muted);">
        西北工业大学 · 飞机设计工程学
      </div>
    </aside>

    <!-- 主区域 -->
    <div id="main">
      <!-- 顶栏 -->
      <header id="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button id="menu-toggle" aria-label="菜单">☰</button>
          <span class="page-title">✈ 首页</span>
        </div>
        <div class="topbar-actions">
          <span id="current-user-name" style="font-size:0.82rem;color:var(--accent);font-weight:600;cursor:pointer;" title="点击切换用户"></span>
          <button id="btn-user" class="btn btn-ghost btn-sm" title="切换用户">🔄</button>
        </div>
      </header>

      <!-- 内容区 -->
      <main id="content">
        <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
          <div style="font-size:3rem;">✈</div>
          <p>加载中...</p>
        </div>
      </main>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container"></div>

  <!-- JS 文件按依赖顺序加载 -->
  <script src="js/utils/helpers.js"></script>
  <script src="js/data/questions.js"></script>
  <script src="js/user.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/router.js"></script>
  <script src="js/ui/renderer.js"></script>
  <script src="js/ui/components.js"></script>
  <script src="js/modes/practice.js"></script>
  <script src="js/ui/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
